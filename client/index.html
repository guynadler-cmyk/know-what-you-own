    <!-- Unregister old service workers and clear caches -->
    <script>
      (async function() {
        let hadServiceWorkers = false;
        
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          if (registrations.length > 0) {
            hadServiceWorkers = true;
            for (const registration of registrations) {
              await registration.unregister();
            }
          }
        }
        
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => caches.delete(name)));
        }
        
        const wasCleanedUp = sessionStorage.getItem('sw-cleanup-done');
        if (hadServiceWorkers && !wasCleanedUp) {
          sessionStorage.setItem('sw-cleanup-done', 'true');
          window.location.reload();
        }
      })();
    </script>
  </head>
  <body>

    <script type="module" src="/src/main.tsx"></script>
  </body>
